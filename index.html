<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Booking Service Wuling Arista Lampung</title>
  
  <link rel="manifest" href="manifest.v1.json">
  <meta name="theme-color" content="#d71920">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        width: 100%;
        overflow: hidden; 
        background-color: #f8fafc; 
    }
    
    /* Layar Loading Menutupi Penuh */
    #layar-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #d71920; /* Merah Wuling */
      z-index: 99999; /* Paling depan */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: sans-serif;
      transition: opacity 0.5s ease; /* Animasi memudar */
    }
    
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid #ffffff;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    
    @keyframes spin { 
        0% { transform: rotate(0deg); } 
        100% { transform: rotate(360deg); } 
    }

    .hide-banner {
      width: 100%;
      height: 100vh;
      position: relative;
      background: #f8fafc;
      overflow: hidden;
    }
    
    .hide-banner iframe {
      position: absolute;
      top: -30px; 
      left: 0;
      width: 100%;
      height: calc(100vh + 30px);
      border: none;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <div id="layar-loading">
    <div class="spinner"></div>
    <p style="font-weight: bold; letter-spacing: 1px;">Menyiapkan Sistem...</p>
  </div>

  <div class="hide-banner">
    <iframe src="https://script.google.com/macros/s/AKfycbwQsPc_NAorLHptiN_v7NSID0IDl6qUwpS_N0a7Ld5xFCxVRfj0c8qZ_FByB3rqibzcCg/exec" onload="hilangkanLoader()"></iframe>
  </div>

  <script>
    // Fungsi untuk menghilangkan loading screen setelah form Google muncul
    function hilangkanLoader() {
      const loader = document.getElementById('layar-loading');
      if(loader) {
        loader.style.opacity = '0'; // Memudar perlahan
        setTimeout(function() { loader.style.display = 'none'; }, 500); // Dihilangkan sepenuhnya
      }
    }

    // Pendaftaran PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.v1.js').catch(function(err) {
            console.log('PWA Gagal', err);
        });
      });
    }
  </script>

</body>
</html>

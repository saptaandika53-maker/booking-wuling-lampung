<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Service Wuling Arista Lampung</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    .hide-banner {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .hide-banner iframe {
      position: absolute;
      top: -30px; /* Angka ini akan menyembunyikan banner Google di bagian atas */
      left: 0;
      width: 100%;
      height: calc(100vh + 30px);
      border: none;
    }
  </style>
</head>
<body>

  <div class="hide-banner">
    <iframe src="https://script.google.com/macros/s/AKfycbwQsPc_NAorLHptiN_v7NSID0IDl6qUwpS_N0a7Ld5xFCxVRfj0c8qZ_FByB3rqibzcCg/exec"></iframe>
  </div>

</body>
</html>

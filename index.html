<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Booking Service Wuling Arista Lampung</title>
  
  <link rel="manifest" href="manifest.v1.json">
  <meta name="theme-color" content="#d71920">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        width: 100%;
        overflow: hidden; 
        background-color: #d71920; 
    }
    
    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      font-family: sans-serif;
      z-index: 9999;
    }
    
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid #ffffff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    
    @keyframes spin { 
        0% { transform: rotate(0deg); } 
        100% { transform: rotate(360deg); } 
    }

    .hide-banner {
      width: 100%;
      height: 100vh;
      position: relative;
      background: #f8fafc;
      overflow: hidden;
    }
    
    .hide-banner iframe {
      position: absolute;
      top: -30px; 
      left: 0;
      width: 100%;
      height: calc(100vh + 30px);
      border: none;
      z-index: 2;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <div class="loader">
    <div class="spinner"></div>
    <p>Loading Booking...</p>
  </div>

  <div class="hide-banner">
    <iframe src="https://script.google.com/macros/s/AKfycbwQsPc_NAorLHptiN_v7NSID0IDl6qUwpS_N0a7Ld5xFCxVRfj0c8qZ_FByB3rqibzcCg/exec"></iframe>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.v1.js').catch(function(err) {
            console.log('PWA Gagal', err);
        });
      });
    }
  </script>

</body>
</html>

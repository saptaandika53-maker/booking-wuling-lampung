<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Booking Service Wuling Arista Lampung</title>
  
  <link rel="manifest" href="manifest.v1.json">
  
  <meta name="theme-color" content="#d71920">
  <link rel="apple-touch-icon" href="icon.png">

    <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%;
      background-color: #f8fafc; 
    }
    .hide-banner {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden; /* Mengunci agar tidak ada scrollbar ganda */
    }
    .hide-banner iframe {
      position: absolute;
      top: -30px; 
      left: 0;
      width: 100%;
      height: calc(100vh + 30px); /* Iframe lebih tinggi dari layar */
      border: none;
      overflow-y: auto; /* Mengizinkan scroll di dalam iframe */
    }
  </style>

</head>
<body>

  <div class="hide-banner">
    <iframe src="https://script.google.com/macros/s/AKfycbwQsPc_NAorLHptiN_v7NSID0IDl6qUwpS_N0a7Ld5xFCxVRfj0c8qZ_FByB3rqibzcCg/exec"></iframe>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('PWA Terdaftar', reg.scope))
          .catch((err) => console.log('PWA Gagal', err));
      });
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Booking Service Wuling Arista Lampung</title>
  
  <link rel="manifest" href="manifest.v1.json">
  
  <meta name="theme-color" content="#d71920">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f8fafc; }
    .hide-banner {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .hide-banner iframe {
      position: absolute;
      top: -30px; 
      left: 0;
      width: 100%;
      height: calc(100vh + 30px);
      border: none;
    }
  </style>
</head>
<body>

  <div class="hide-banner">
    <iframe src="LINK_EXEC_ANDA"></iframe>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('PWA Terdaftar', reg.scope))
          .catch((err) => console.log('PWA Gagal', err));
      });
    }
  </script>

</head>
</html>
